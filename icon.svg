<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="130%" y2="130%">
      <stop offset="0%" stop-color="#1e1e24"/>
      <stop offset="100%" stop-color="#141418"/>
    </linearGradient>
    <linearGradient id="header" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a7a8a"/>
      <stop offset="100%" stop-color="#1a5a6e"/>
    </linearGradient>
    <linearGradient id="today" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3ab8cc"/>
      <stop offset="100%" stop-color="#1e8fa8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>
  <rect x="1" y="1" width="178" height="178" rx="39" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.07"/>

  <!-- Calendar card -->
  <rect x="26" y="46" width="128" height="108" rx="15" fill="#1a1a20"/>
  <rect x="26" y="46" width="128" height="108" rx="15" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.07"/>

  <!-- Header -->
  <rect x="26" y="46" width="128" height="44" rx="15" fill="url(#header)"/>
  <rect x="26" y="72" width="128" height="18" fill="url(#header)"/>
  <rect x="26" y="46" width="128" height="44" rx="15" fill="#ffffff" opacity="0.04"/>

  <!-- Ring pegs -->
  <rect x="62" y="32" width="8" height="26" rx="4" fill="#3ab8cc" opacity="0.85" filter="url(#glow)"/>
  <rect x="110" y="32" width="8" height="26" rx="4" fill="#3ab8cc" opacity="0.85" filter="url(#glow)"/>

  <!-- Header text lines -->
  <rect x="40" y="57" width="38" height="5" rx="2.5" fill="#ffffff" opacity="0.75"/>
  <rect x="40" y="66" width="24" height="3.5" rx="1.75" fill="#ffffff" opacity="0.3"/>

  <!-- Day grid — 5 cells, single row -->
  <rect x="36" y="108" width="18" height="16" rx="5" fill="#252530"/>
  <rect x="61" y="108" width="18" height="16" rx="5" fill="#252530"/>
  <!-- Today -->
  <rect x="86" y="105" width="22" height="22" rx="6" fill="url(#today)" filter="url(#glow)"/>
  <rect x="115" y="108" width="18" height="16" rx="5" fill="#252530"/>
  <rect x="140" y="108" width="14" height="16" rx="5" fill="#252530" opacity="0.35"/>

  <!-- Second row — 3 cells only -->
  <rect x="36" y="132" width="18" height="14" rx="5" fill="#252530" opacity="0.6"/>
  <rect x="61" y="132" width="18" height="14" rx="5" fill="#1e5a6e" opacity="0.55"/>
  <rect x="86" y="132" width="18" height="14" rx="5" fill="#252530" opacity="0.6"/>
</svg>
